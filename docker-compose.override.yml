# Auto-loaded local override intentionally keeps the base compose behavior unchanged.
#
# Reason: on this Docker Desktop setup, bind-mounted source paths under /Users are exposed
# as fakeowner mounts and break Python imports / TypeScript file reads inside the containers.
# That makes a normal `docker compose up` unstable.
#
# Working default flow:
#   docker compose up -d --build
#
# For live code reload during development, use the non-Docker local workflow from README.md.

services: {}
